<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Signature Preview</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    transform-origin: top left;
  }
</style>
</head>
<body>
<iframe id="f" src="RiyadhRe-Email-Signature.html"></iframe>
<script>
  const f = document.getElementById('f');
  f.addEventListener('load', () => {
    try {
      const doc = f.contentDocument;
      const win = f.contentWindow;

      // Override body to 3x2 grid with scaling
      const style = doc.createElement('style');
      style.textContent = `
        body {
          display: grid !important;
          grid-template-columns: repeat(3, 1fr) !important;
          flex-direction: unset !important;
          align-items: start !important;
          gap: 14px 20px !important;
          padding: 20px 16px !important;
          overflow: hidden !important;
          box-sizing: border-box !important;
          min-height: auto !important;
          height: auto !important;
        }
        .label {
          grid-column: unset;
          margin-bottom: 0 !important;
          font-size: 8px !important;
          letter-spacing: 2px !important;
        }
        .label + * {
          margin-top: -8px;
        }
        .a, .b, .c, .d, .e, .f {
          transform-origin: top center;
          max-width: 100% !important;
          width: 100% !important;
        }
        /* Scale everything to fit the viewport */
        .grid-cell {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 6px;
          min-width: 0;
        }
        .grid-cell > *:not(.label) {
          width: 100% !important;
          max-width: 100% !important;
        }
      `;
      doc.head.appendChild(style);

      // Wrap each label+card in a container for clean grid cells
      const body = doc.body;
      const children = Array.from(body.children);
      body.innerHTML = '';
      for (let i = 0; i < children.length; i += 2) {
        const cell = doc.createElement('div');
        cell.className = 'grid-cell';
        if (children[i]) cell.appendChild(children[i]);
        if (children[i+1]) cell.appendChild(children[i+1]);
        body.appendChild(cell);
      }

      // Scale body to fit the iframe viewport
      function scaleToFit() {
        body.style.transform = 'none';
        const contentH = body.scrollHeight;
        const viewH = win.innerHeight;
        if (contentH > viewH) {
          const scale = viewH / contentH;
          body.style.transform = 'scale(' + scale + ')';
          body.style.transformOrigin = 'top left';
          body.style.width = (100 / scale) + '%';
        }
      }
      scaleToFit();
      win.addEventListener('resize', scaleToFit);

      // Replay animations every 7 seconds
      function replayAnimations() {
        doc.body.querySelectorAll('*').forEach(el => {
          const cs = win.getComputedStyle(el);
          if (cs.animationName && cs.animationName !== 'none') {
            el.style.animation = 'none';
          }
        });
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            doc.body.querySelectorAll('*').forEach(el => {
              el.style.animation = '';
            });
          });
        });
      }

      setInterval(replayAnimations, 7000);

    } catch(e) { console.error(e); }
  });
</script>
</body>
</html>
