<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Signature Preview</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
  iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<iframe id="f" src="RiyadhRe-Email-Signature.html"></iframe>
<script>
  const f = document.getElementById('f');
  f.addEventListener('load', () => {
    try {
      const doc = f.contentDocument;
      const win = f.contentWindow;

      const style = doc.createElement('style');
      style.textContent = `
        body {
          display: grid !important;
          grid-template-columns: repeat(3, 1fr) !important;
          flex-direction: unset !important;
          align-items: start !important;
          gap: 14px 20px !important;
          padding: 20px 16px !important;
          overflow: hidden !important;
          box-sizing: border-box !important;
          height: auto !important;
          min-height: auto !important;
          transition: opacity 0.4s ease !important;
        }
        .label {
          grid-column: unset;
          margin-bottom: 0 !important;
          font-size: 8px !important;
          letter-spacing: 2px !important;
        }
        .label + * { margin-top: -8px; }
        .a, .b, .c, .d, .e, .f {
          transform-origin: top center;
          max-width: 100% !important;
          width: 100% !important;
        }
        .grid-cell {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 6px;
          min-width: 0;
        }
        .grid-cell > *:not(.label) {
          width: 100% !important;
          max-width: 100% !important;
        }
      `;
      doc.head.appendChild(style);

      // Wrap each label+card pair in a grid cell
      const body = doc.body;
      const children = Array.from(body.children);
      body.innerHTML = '';
      for (let i = 0; i < children.length; i += 2) {
        const cell = doc.createElement('div');
        cell.className = 'grid-cell';
        if (children[i]) cell.appendChild(children[i]);
        if (children[i+1]) cell.appendChild(children[i+1]);
        body.appendChild(cell);
      }

      // Scale to fit viewport
      function scaleToFit() {
        body.style.transform = 'none';
        body.style.width = '100%';
        const contentH = body.scrollHeight;
        const viewH = win.innerHeight;
        if (contentH > viewH) {
          const s = viewH / contentH;
          body.style.transform = 'scale(' + s + ')';
          body.style.transformOrigin = 'top left';
          body.style.width = (100 / s) + '%';
        }
      }
      scaleToFit();
      win.addEventListener('resize', scaleToFit);

      // Replay: fade out, clone cells to restart animations, fade in
      setInterval(() => {
        body.style.opacity = '0';
        setTimeout(() => {
          body.querySelectorAll('.grid-cell').forEach(cell => {
            const clone = cell.cloneNode(true);
            cell.parentNode.replaceChild(clone, cell);
          });
          scaleToFit();
          setTimeout(() => { body.style.opacity = '1'; }, 50);
        }, 400);
      }, 8000);

    } catch(e) { console.error(e); }
  });
</script>
</body>
</html>
