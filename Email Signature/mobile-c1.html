<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiyadhRe Signature — C1 Mobile</title>
<style>
  @font-face {
    font-family: 'ABCFavorit';
    src: url('fonts/ABCFavoritArabic-Light-Trial.otf') format('opentype');
    font-weight: 300;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('fonts/ABCFavoritArabic-Regular-Trial.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('fonts/ABCFavoritArabic-Book-Trial.otf') format('opentype');
    font-weight: 450;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('fonts/ABCFavoritArabic-Medium-Trial.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'ABCFavorit';
    src: url('fonts/ABCFavoritArabic-Bold-Trial.otf') format('opentype');
    font-weight: 700;
  }

  :root {
    --dbrown: #503E32;
    --lbrown: #8E6846;
    --dsand: #E4BB90;
    --lsand: #EDD3BC;
    --cream: #F5EDE4;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ABCFavorit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 24px;
    gap: 28px;
  }

  a { text-decoration: none; color: inherit; }

  .ic svg {
    width: 12px; height: 12px;
    fill: none; stroke: var(--dsand); stroke-width: 1.6;
    stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  .shield-ic svg {
    width: 11px; height: 11px;
    fill: none; stroke: currentColor; stroke-width: 1.6;
    stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* ── OPTION C1 ── */
  .c1-bar {
    width: min(100%, 620px);
    display: flex; align-items: center;
    background: var(--dbrown); border-radius: 5px;
    padding: 16px 22px;
    box-shadow: 0 8px 36px rgba(80,62,50,0.14);
  }

  .c1-bar img {
    height: 28px; width: auto; flex-shrink: 0;
  }

  .c1-bar .vd {
    width: 1px; height: 36px; background: var(--lbrown);
    margin: 0 16px; flex-shrink: 0;
  }

  .c1-bar .nb { flex-shrink: 0; }
  .c1-bar .nm { font-weight: 700; font-size: 14px; color: var(--white); }
  .c1-bar .nm-ar { font-weight: 500; font-size: 10px; color: var(--dsand); margin-top: 1px; }
  .c1-bar .rl {
    font-weight: 400; font-size: 9px; color: var(--lbrown);
    letter-spacing: 1px; text-transform: none; margin-top: 2px;
  }

  .c1-bar .inf { display: flex; flex-direction: column; gap: 3px; margin-left: auto; }
  .c1-bar .ci {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 400; color: var(--lsand);
  }

  /* Awards + Social strip */
  .c1-awards {
    width: min(100%, 620px);
    display: flex; align-items: center; gap: 16px;
    background: var(--cream);
    border: 1px solid var(--lsand);
    border-top: none;
    border-radius: 0 0 5px 5px;
    padding: 8px 22px;
  }

  .c1-awards .awards-row {
    display: flex; align-items: center; gap: 16px;
    flex: 1;
  }

  .c1-awards .badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; font-weight: 500; color: var(--dbrown);
    letter-spacing: 0.5px;
  }

  .c1-awards .badge .shield-ic { color: var(--lbrown); }

  .c1-awards .badge-sep {
    width: 1px; height: 14px; background: var(--dsand);
    flex-shrink: 0;
  }

  .c1-awards .soc-right {
    display: flex; align-items: center; gap: 10px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .c1-awards .soc-right a { display: flex; }
  .c1-awards .soc-right svg {
    width: 12px; height: 12px;
    fill: var(--lbrown);
  }

  /* ── MOBILE ── */
  @media (max-width: 500px) {
    body { padding: 12px 8px; gap: 20px; }

    .c1-bar {
      width: 100%;
      flex-direction: column; align-items: flex-start;
      padding: 18px 20px; gap: 0;
      border-radius: 6px 6px 0 0;
    }
    .c1-bar img { height: 20px; margin-bottom: 14px; }
    .c1-bar .vd { display: none; }
    .c1-bar .nb { margin-bottom: 12px; }
    .c1-bar .nm { font-size: 14px; line-height: 1.2; }
    .c1-bar .nm-ar { font-size: 10px; margin-top: 2px; }
    .c1-bar .rl { font-size: 9px; margin-top: 3px; letter-spacing: 0.5px; }
    .c1-bar .inf {
      margin-left: 0; width: 100%; gap: 6px;
      padding-top: 12px;
      border-top: 1px solid rgba(142,104,70,0.3);
    }
    .c1-bar .ci { font-size: 10px; gap: 6px; }
    .c1-bar .ic svg { width: 11px; height: 11px; }

    .c1-awards {
      width: 100%;
      border-radius: 0 0 6px 6px;
      padding: 8px 20px; gap: 8px;
      flex-wrap: wrap;
    }
    .c1-awards .awards-row { gap: 10px; flex-wrap: wrap; }
    .c1-awards .badge { font-size: 8px; gap: 4px; }
    .c1-awards .shield-ic svg { width: 9px; height: 9px; }
    .c1-awards .soc-right { margin-left: auto; gap: 10px; }
    .c1-awards .soc-right svg { width: 11px; height: 11px; }
  }
</style>
</head>
